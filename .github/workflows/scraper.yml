name: Wantedly Analytics Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 9:00 JST (= UTC 00:00)
  workflow_dispatch:      # GitHub 画面から手動実行も可

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Restore secrets
        run: |
          mkdir -p data
          echo "${{ secrets.SESSION_JSON_B64 }}"     | base64 -d > data/session.json
          echo "${{ secrets.CREDENTIALS_JSON_B64 }}" | base64 -d > credentials.json
          echo "${{ secrets.SHEET_ID }}"             > data/sheet_id.txt

      - name: Run scraper
        run: uv run python scraper.py
